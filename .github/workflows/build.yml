name: Build and Release

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Update version properties
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION_CLEAN=$(echo "${{ github.ref_name }}" | sed 's/^[vV]//')
          sed -i -E "s/(mod_version=).*/\1${VERSION_CLEAN}/g" gradle.properties
          
          # Extract NeoForge version from gradle.properties
          NEO_VERSION=$(grep 'neo_version=' gradle.properties | cut -d'=' -f2 | tr -d '\r')
          
          # Update version and NeoForge badges in README.md
          sed -i -E "s|(https://img.shields.io/badge/version-)[vV]?[0-9]+[^-]*|\1${{ github.ref_name }}|g" README.md
          sed -i -E "s|(https://img.shields.io/badge/NeoForge-)[0-9]+\.[0-9]+\.[0-9]+[^-]*|\1${NEO_VERSION}|g" README.md

      - name: Build with Gradle
        run: ./gradlew build

      - name: Commit and push version bump
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add gradle.properties README.md
          git commit -m "chore: bump version to ${{ github.ref_name }} [skip ci]" || echo "No changes to commit"
          git push origin HEAD:${{ github.event.repository.default_branch }}

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/*.jar
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}